[build]
  command = "npm run build"
  publish = "dist"

# SPA: redirige todo a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Caching estático (ajústalo a tu gusto)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/nombres_completos.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
